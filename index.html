  :root {
    --bg: #05060b;
    --bg2: #030408;
    --surface: #131a2b;
    --surface2: #1b2440;
    --line: #26304e;
    --line2: #333d5e;
    --text: #f7fbf9;
    --muted: #8496ad;
    --faint: #5a6880;
    --accent: #4d7396;
    --accent-2: #2d3d4c;
    --cyan: #64d1c1;
    --gold: #e8c878;
    --radius: 3px;
    --display: "Oswald", "Bahnschrift", "Arial Narrow", sans-serif;
    --mono: "JetBrains Mono", "Cascadia Mono", Consolas, ui-monospace, monospace;
    --s1: #6fd6c8;
    --s2: #5cbcba;
    --s3: #52a1ad;
    --s4: #4d87a0;
    --s5: #4d7396;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.45;
    min-height: 100vh;
  }
  button { cursor: pointer; }
  button:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 20px 12px;
  }
  .brand {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .brand em { color: var(--cyan); font-style: normal; }
  .topbar .src {
    font-size: 9px;
    letter-spacing: 1.2px;
    color: var(--faint);
    text-transform: uppercase;
    text-align: right;
  }

  .board {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 22px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 8px 20px 48px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    min-width: 320px;
  }
  .panel.roster { flex: 590 1 0; }
  .panel.draft  { flex: 470 1 0; }

  .panel > header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
  }
  .panel > header h1 {
    margin: 0;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .panel > header .stat {
    font-size: 10px;
    letter-spacing: 1.2px;
    color: var(--muted);
  }

  /* ---------- roster ---------- */
  .slots { display: flex; flex-direction: column; gap: 10px; padding: 14px 14px 0; }
  .slot {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 58px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-left: 3px solid var(--sc, var(--faint));
    border-radius: var(--radius);
  }
  .slot .tag { flex: 0 0 84px; }
  .slot .tag .role {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--sc, var(--muted));
  }
  .slot .tag .state {
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--faint);
    margin-top: 3px;
  }
  .slot .empty-hint {
    flex: 1;
    font-size: 11px;
    color: var(--faint);
  }
  .slot .who { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
  .slot .who .name {
    flex: 1 1 auto;
    min-width: 32px;
    font-family: var(--display);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lead-chip {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--gold);
    border: 1px solid #57492a;
    background: #191507;
    border-radius: var(--radius);
    padding: 2px 6px;
    white-space: nowrap;
  }
  .tier-pill {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid currentColor;
    border-radius: var(--radius);
    white-space: nowrap;
  }
  .clan-chip {
    flex: 0 1 auto;
    max-width: 130px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--muted);
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    padding: 2px 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .year-chip {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--faint);
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    padding: 2px 6px;
    white-space: nowrap;
  }
  .ovr {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .slot .ovr-wrap { display: flex; align-items: center; gap: 12px; }
  .crown {
    background: none;
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    color: var(--faint);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1;
    padding: 6px 8px;
  }
  .crown:hover { color: var(--gold); border-color: #57492a; }
  .crown.on { color: var(--gold); border-color: #57492a; background: #191507; }

  .leader-row { padding: 12px 14px 0; }
  .mini-box {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 11px 14px;
  }
  .mini-box .mini-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    flex: 0 0 84px;
  }
  .mini-box .mini-val { font-size: 11px; color: var(--faint); }
  .mini-box .mini-val.set {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: var(--gold);
  }

  .power { padding: 18px 16px 16px; }
  .power .power-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 9px;
  }
  .power .power-head .lbl { font-size: 10px; letter-spacing: 2px; color: var(--muted); }
  .power .power-head .num {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .bar { height: 4px; background: var(--line); border-radius: 2px; }
  .bar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 2px;
    transition: width 0.35s ease;
  }
  .power .hint {
    margin: 12px 0 0;
    font-size: 10.5px;
    color: var(--faint);
  }
  .power .hint b { color: var(--muted); font-weight: 400; }

  /* ---------- draft ---------- */
  .stage { padding: 14px; }
  .idle-box {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 46px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .btn-roll {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 13px 32px;
  }
  .btn-roll:hover { background: var(--cyan); color: var(--bg2); }
  .btn-row { display: flex; gap: 10px; }
  .btn-light {
    background: var(--text);
    color: var(--bg2);
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 12px;
  }
  .btn-light:hover { background: #fff; }
  .btn-outline {
    background: none;
    border: 1px solid var(--cyan);
    border-radius: var(--radius);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 12px;
  }
  .btn-outline:hover { background: rgba(100, 209, 193, 0.12); }
  .btn-outline:disabled {
    border-color: var(--line2);
    color: var(--faint);
    cursor: not-allowed;
    background: none;
  }
  .caption {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--faint);
    text-align: center;
    text-transform: uppercase;
  }

  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    padding: 11px 14px;
    animation: deal 0.25s ease backwards;
  }
  .card:hover { border-color: var(--cyan); background: var(--bg2); }
  .card .name {
    flex: 1;
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .take {
    width: 56px;
    flex: none;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--cyan);
    text-align: right;
    opacity: 0;
  }

:"RSF","year":2020},{"name":"Rotmxz","ovr":71,"tier":"B","clan":"","year":2020},{"name":"RushAiot","ovr":71,"tier":"B","clan":"","year":2020},{"name":"Vanixus","ovr":71,"tier":"B","clan":"","year":2020},{"name":"Zkarex","ovr":71,"tier":"B","clan":"","year":2020},{"name":"BeanithBomber","ovr":70,"tier":"B","clan":"","year":2017},{"name":"OpticIllusion101","ovr":70,"tier":"B","clan":"","year":2016},{"name":"parasights","ovr":70,"tier":"B","clan":"","year":2016},{"name":"EnterScreenName","ovr":69,"tier":"C","clan":"","year":2017},{"name":"NiteOwlFac","ovr":69,"tier":"C","clan":"","year":2016},{"name":"Kryex","ovr":68,"tier":"C","clan":"","year":2021},{"name":"rystanvx","ovr":68,"tier":"C","clan":"","year":2021},{"name":"Shatteroni","ovr":68,"tier":"C","clan":"","year":2017},{"name":"YungsterBeetleJuice","ovr":68,"tier":"C","clan":"","year":2021},{"name":"Allyrion","ovr":67,"tier":"C","clan":"","year":2020},{"name":"CaptainHamster387","ovr":67,"tier":"C","clan":"","year":2026},{"name":"dawid2177","ovr":67,"tier":"C","clan":"","year":2026},{"name":"Foxxism","ovr":67,"tier":"C","clan":"","year":2026},{"name":"Khayso","ovr":67,"tier":"C","clan":"","year":2020},{"name":"Lagqy","ovr":67,"tier":"C","clan":"","year":2020},{"name":"lordtyler","ovr":67,"tier":"C","clan":"","year":2017},{"name":"omni","ovr":67,"tier":"C","clan":"","year":2017},{"name":"roidboy8","ovr":67,"tier":"C","clan":"","year":2026},{"name":"Saberspell","ovr":67,"tier":"C","clan":"","year":2020},{"name":"vGrayboy","ovr":67,"tier":"C","clan":"","year":2026},{"name":"brizingers","ovr":66,"tier":"C","clan":"","year":2018},{"name":"outbck","ovr":66,"tier":"C","clan":"","year":2021},{"name":"yurk_xe","ovr":58,"tier":"D","clan":"BW","year":2026}];

  var TIER_OVR = {
    "S+": 99, "S": 96, "S-": 93,
    "X+": 90, "X": 87, "X-": 84,
    "A+": 80, "A": 77, "A-": 74,
    "B+": 70, "B": 67, "B-": 64,
    "C+": 60, "C": 57, "C-": 54,
    "D+": 50, "D": 47, "D-": 44
  };
  var TIER_COLOR = {
    S: "#e8c878", X: "#b58cf0", A: "#4fc6f0",
    B: "#5fd6a0", C: "#8a98a6", D: "#5c6975"
  };
  var SLOT_ACCENTS = ["var(--s1)", "var(--s2)", "var(--s3)", "var(--s4)", "var(--s5)"];
  var SLOT_COUNT = 5;
  var ROLL_SIZE = 5;
  var REROLLS_MAX = 1;

  PLAYERS.forEach(function (p) {
    p.color = TIER_COLOR[p.tier.charAt(0)] || TIER_COLOR.D;
  });

  var slots = [null, null, null, null, null];
  var leaderIdx = null;
  var roll = null;
  var rerollsLeft = REROLLS_MAX;

  document.getElementById("pool-size").textContent = PLAYERS.length;

  function lockedNames() {
    var s = {};
    slots.forEach(function (p) { if (p) s[p.name] = true; });
    return s;
  }
  function availablePool() {
    var taken = lockedNames();
    return PLAYERS.filter(function (p) { return !taken[p.name]; });
  }
  function sample(arr, n) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a.slice(0, n);
  }
  function openCount() {
    return slots.filter(function (p) { return !p; }).length;
  }
  function esc(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function doRoll() {
    if (roll || openCount() === 0) return;
    roll = sample(availablePool(), ROLL_SIZE);
    render();
  }
  function doReroll() {
    if (!roll || rerollsLeft <= 0) return;
    rerollsLeft--;
    var shown = {};
    roll.forEach(function (p) { shown[p.name] = true; });
    var fresh = availablePool().filter(function (p) { return !shown[p.name]; });
    roll = fresh.length >= ROLL_SIZE ? sample(fresh, ROLL_SIZE) : sample(availablePool(), ROLL_SIZE);
    render();
  }
  function pick(i) {
    if (!roll || !roll[i]) return;
    var player = roll[i];
    for (var s = 0; s < SLOT_COUNT; s++) {
      if (!slots[s]) { slots[s] = player; break; }
    }
    roll = null;
    render();
  }
  function autoFill() {
    var fills = sample(availablePool(), openCount());
    for (var s = 0; s < SLOT_COUNT && fills.length; s++) {
      if (!slots[s]) slots[s] = fills.shift();
    }
    roll = null;
    render();
  }
  function newRun() {
    slots = [null, null, null, null, null];
    leaderIdx = null;
    roll = null;
    rerollsLeft = REROLLS_MAX;
    render();
  }
  function toggleLeader(i) {
    if (!slots[i]) return;
    leaderIdx = leaderIdx === i ? null : i;
    render();
  }

  function renderSlots() {
    var html = "";
    for (var i = 0; i < SLOT_COUNT; i++) {
      var p = slots[i];
      html += '<div class="slot" style="--sc:' + SLOT_ACCENTS[i] + '">';
      html += '<div class="tag"><div class="role">SLOT ' + (i + 1) + "</div>";
      html += '<div class="state">' + (p ? "LOCKED" : "OPEN") + "</div></div>";
      if (p) {
        html += '<div class="who"><span class="name">' + esc(p.name) + "</span>";
        html += '<span class="tier-pill" style="color:' + p.color + '">' + p.tier + "</span>";
        if (p.clan) html += '<span class="clan-chip">' + esc(p.clan) + "</span>";
        html += '<span class="year-chip">' + p.year + "</span>";
        if (leaderIdx === i) html += '<span class="lead-chip">&#9819; LEADER</span>';
        html += "</div>";
        html += '<div class="ovr-wrap"><span class="ovr" style="color:' + p.color + '">' + p.ovr + "</span>";
        html += '<button type="button" class="crown' + (leaderIdx === i ? " on" : "") +
          '" data-slot="' + i + '" aria-pressed="' + (leaderIdx === i) +
          '" title="Lock in as leader" aria-label="Lock in ' + esc(p.name) + ' as leader">&#9819;</button></div>';
      } else {
        html += '<div class="empty-hint">&mdash; roll a team and pick a clanner</div>';
      }
      html += "</div>";
    }
    document.getElementById("slots").innerHTML = html;
    var crowns = document.querySelectorAll(".crown");
    for (var c = 0; c < crowns.length; c++) {
      crowns[c].addEventListener("click", function () {
        toggleLeader(parseInt(this.getAttribute("data-slot"), 10));
      });
    }
  }

  function renderStage() {
    var stage = document.getElementById("stage");
    var open = openCount();
    var html = "";

    if (open === 0) {
      var sum = 0;
      slots.forEach(function (p) { sum += p.ovr; });
      html += '<div class="done-box">';
      html += '<div class="done-title">Roster Complete</div>';
      html += '<div class="done-power">' + Math.round(sum / SLOT_COUNT) + ' <span class="unit">PWR</span></div>';
      if (leaderIdx === null) html += '<div class="caption">TIP: HIT &#9819; ON A PLAYER TO LOCK IN A LEADER</div>';
      html += '<button type="button" class="btn-outline" id="btn-new">+ New run</button>';
      html += "</div>";
    } else if (roll) {
      html += '<div class="cards">';
      roll.forEach(function (p, i) {
        html += '<button type="button" class="card" data-pick="' + i + '" style="animation-delay:' + i * 45 + 'ms">';
        html += '<span class="name">' + esc(p.name) + "</span>";
        html += '<span class="take">TAKE &rarr;</span>';
        html += '<span class="tier-pill" style="color:' + p.color + '">' + p.tier + "</span>";
        html += '<span class="clan-chip' + (p.clan ? '' : ' empty') + '"' +
          (p.clan ? ' title="' + esc(p.clan) + '"' : '') + '>' + (p.clan ? esc(p.clan) : "") + "</span>";
        html += '<span class="year-chip">' + p.year + "</span>";
        html += '<span class="ovr" style="color:' + p.color + '">' + p.ovr + "</span>";
        html += "</button>";
      });
      html += "</div>";
      html += '<div class="roll-foot">';
      html += '<button type="button" class="btn-outline" id="btn-reroll"' + (rerollsLeft <= 0 ? " disabled" : "") +
        ">&#8635; Reroll</button>";
      html += '<button type="button" class="btn-light" id="btn-auto">Auto-fill</button>';
      html += '<button type="button" class="btn-outline" id="btn-new">+ New run</button>';
      html += "</div>";
      html += '<div class="caption under">TAKE ONE PLAYER &middot; ' + open + " SLOT" + (open === 1 ? "" : "S") + " LEFT</div>";
    } else {
      html += '<div class="idle-box">';
      html += '<button type="button" class="btn-roll" id="btn-roll">&#8635; Roll Team</button>';
      html += '<div class="btn-row">';
      html += '<button type="button" class="btn-light" id="btn-auto">Auto-fill</button>';
      html += '<button type="button" class="btn-outline" id="btn-new">+ New run</button>';
      html += "</div>";
      html += '<div class="caption">ROLL A TEAM &middot; TAKE ONE PLAYER &middot; ' + open + " SLOT" + (open === 1 ? "" : "S") + " LEFT</div>";
      html += "</div>";
    }

    stage.innerHTML = html;

    var el;
    if ((el = document.getElementById("btn-roll"))) el.addEventListener("click", doRoll);
    if ((el = document.getElementById("btn-reroll"))) el.addEventListener("click", doReroll);
    if ((el = document.getElementById("btn-auto"))) el.addEventListener("click", autoFill);
    if ((el = document.getElementById("btn-new"))) el.addEventListener("click", newRun);
    var cards = stage.querySelectorAll(".card");
    for (var i = 0; i < cards.length; i++) {
      cards[i].addEventListener("click", function () {
        pick(parseInt(this.getAttribute("data-pick"), 10));
      });
    }
  }

  function renderMeta() {
    var locked = SLOT_COUNT - openCount();
    document.getElementById("lock-stat").textContent = locked + " / " + SLOT_COUNT + " LOCKED";
    document.getElementById("reroll-stat").textContent = rerollsLeft + " / " + REROLLS_MAX + " REROLLS";

    var leaderEl = document.getElementById("leader-val");
    if (leaderIdx !== null && slots[leaderIdx]) {
      leaderEl.innerHTML = "&#9819; " + esc(slots[leaderIdx].name);
      leaderEl.className = "mini-val set";
    } else {
      leaderEl.innerHTML = "&mdash; none &mdash;";
      leaderEl.className = "mini-val";
    }

    var numEl = document.getElementById("power-num");
    var fillEl = document.getElementById("power-fill");
    var hintEl = document.getElementById("power-hint");
    if (locked === 0) {
      numEl.textContent = "—";
      fillEl.style.width = "0%";
      hintEl.innerHTML = "lock players to <b>build power</b>";
    } else {
      var sum = 0;
      slots.forEach(function (p) { if (p) sum += p.ovr; });
      var avg = Math.round(sum / locked);
      numEl.textContent = avg;
      fillEl.style.width = avg + "%";
      hintEl.innerHTML = locked < SLOT_COUNT
        ? "average OVR of <b>" + locked + " locked</b> player" + (locked === 1 ? "" : "s")
        : "final team power &middot; <b>run complete</b>";
    }
  }

  function render() {
    renderSlots();
    renderStage();
    renderMeta();
  }

  render();
</script>
