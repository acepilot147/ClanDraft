  :root {
    --bg: #05060b;
    --bg2: #030408;
    --surface: #131a2b;
    --surface2: #1b2440;
    --line: #26304e;
    --line2: #333d5e;
    --text: #f7fbf9;
    --muted: #8496ad;
    --faint: #5a6880;
    --accent: #4d7396;
    --accent-2: #2d3d4c;
    --cyan: #64d1c1;
    --gold: #e8c878;
    --radius: 3px;
    --display: "Oswald", "Bahnschrift", "Arial Narrow", sans-serif;
    --mono: "JetBrains Mono", "Cascadia Mono", Consolas, ui-monospace, monospace;
    --s1: #6fd6c8;
    --s2: #5cbcba;
    --s3: #52a1ad;
    --s4: #4d87a0;
    --s5: #4d7396;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.45;
    min-height: 100vh;
  }
  button { cursor: pointer; touch-action: manipulation; }
  button:focus-visible {
    outline: 2px solid var(--cyan);
    outline-offset: 2px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 20px 20px 12px;
  }
  .brand {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .brand em { color: var(--cyan); font-style: normal; }
  .topbar .src {
    font-size: 9px;
    letter-spacing: 1.2px;
    color: var(--faint);
    text-transform: uppercase;
    text-align: right;
  }

  .board {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 22px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 8px 20px 48px;
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    min-width: 320px;
  }
  .panel.roster { flex: 590 1 0; }
  .panel.draft  { flex: 470 1 0; }

  .panel > header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--line);
  }
  .panel > header h1 {
    margin: 0;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .panel > header .stat {
    font-size: 10px;
    letter-spacing: 1.2px;
    color: var(--muted);
  }

  /* ---------- roster ---------- */
  .slots { display: flex; flex-direction: column; gap: 10px; padding: 14px 14px 0; }
  .slot {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 58px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-left: 3px solid var(--sc, var(--faint));
    border-radius: var(--radius);
  }
  .slot .tag { flex: 0 0 84px; }
  .slot .tag .role {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--sc, var(--muted));
  }
  .slot .tag .state {
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--faint);
    margin-top: 3px;
  }
  .slot .empty-hint {
    flex: 1;
    font-size: 11px;
    color: var(--faint);
  }
  .slot .who { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
  .slot .who .name {
    flex: 1 1 auto;
    min-width: 32px;
    font-family: var(--display);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lead-chip {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--gold);
    border: 1px solid #57492a;
    background: #191507;
    border-radius: var(--radius);
    padding: 2px 6px;
    white-space: nowrap;
  }
  .cheat-chip {
    flex: none;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #f27d7d;
    border: 1px solid #5c2b2b;
    background: #1c0b0b;
    border-radius: var(--radius);
    padding: 2px 6px;
    white-space: nowrap;
  }
  .tier-pill {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid currentColor;
    border-radius: var(--radius);
    white-space: nowrap;
  }
  .clan-chip {
    flex: 0 1 auto;
    max-width: 130px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--muted);
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    padding: 2px 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .year-chip {
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--faint);
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    padding: 2px 6px;
    white-space: nowrap;
  }
  .ovr {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .slot .ovr-wrap { display: flex; align-items: center; gap: 12px; }
  .crown {
    background: none;
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    color: var(--faint);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1;
    padding: 6px 8px;
  }
  .crown:hover { color: var(--gold); border-color: #57492a; }
  .crown.on { color: var(--gold); border-color: #57492a; background: #191507; }
  /* Roster full but no leader crowned: the crowns glow to say "pick one" */
  .crown.pick-me {
    color: var(--gold);
    border-color: #57492a;
    animation: crown-pulse 1.5s ease-in-out infinite;
  }
  @keyframes crown-pulse {
    0%, 100% { box-shadow: 0 0 4px 0 rgba(232, 200, 120, 0.3); }
    50%      { box-shadow: 0 0 12px 2px rgba(232, 200, 120, 0.75); }
  }
  .mini-box .pick-hint { color: var(--gold); font-size: 10px; }
  @media (prefers-reduced-motion: reduce) {
    .crown.pick-me { animation: none; box-shadow: 0 0 8px 1px rgba(232, 200, 120, 0.5); }
  }

  .leader-row { padding: 12px 14px 0; }
  .mini-box {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--bg);
    padding: 11px 14px;
  }
  .mini-box .mini-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--muted);
    flex: 0 0 84px;
  }
  .mini-box .mini-val { font-size: 11px; color: var(--faint); }
  .mini-box .mini-val.set {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.4px;
    color: var(--gold);
  }

  .power { padding: 18px 16px 16px; }
  .power .power-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 9px;
  }
  .power .power-head .lbl { font-size: 10px; letter-spacing: 2px; color: var(--muted); }
  .power .power-head .num {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .power .power-head .num .pwr-lead { font-size: 12px; color: var(--gold); }
  .bar { height: 4px; background: var(--line); border-radius: 2px; }
  .bar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 2px;
    transition: width 0.35s ease;
  }
  .power .hint {
    margin: 12px 0 0;
    font-size: 10.5px;
    color: var(--faint);
  }
  .power .hint b { color: var(--muted); font-weight: 400; }

  /* ---------- draft ---------- */
  .stage { padding: 14px; }
  .idle-box {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 46px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .btn-roll {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-family: var(--display);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 13px 32px;
  }
  .btn-roll:hover { background: var(--cyan); color: var(--bg2); }
  .btn-row { display: flex; gap: 10px; }
  .btn-light {
    background: var(--text);
    color: var(--bg2);
    border: none;
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 12px;
  }
  .btn-light:hover { background: #fff; }
  .btn-outline {
    background: none;
    border: 1px solid var(--cyan);
    border-radius: var(--radius);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 12px;
  }
  .btn-outline:hover { background: rgba(100, 209, 193, 0.12); }
  .btn-outline:disabled {
    border-color: var(--line2);
    color: var(--faint);
    cursor: not-allowed;
    background: none;
  }
  .caption {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--faint);
    text-align: center;
    text-transform: uppercase;
  }

  .cards { display: flex; flex-direction: column; gap: 8px; }
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
    padding: 11px 14px;
    position: relative;
    overflow: hidden;
    animation: deal 0.25s ease backwards;
  }
  .card:hover { border-color: var(--cyan); background: var(--bg2); }
  .card .name {
    flex: 1;
    font-family: var(--display);
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card .take {
    width: 56px;
    flex: none;
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--cyan);
    text-align: right;
    opacity: 0;
  }
  .card:hover .take, .card:focus-visible .take { opacity: 1; }
  .card .tier-pill {
    width: 34px;
    flex: none;
    padding-left: 0;
    padding-right: 0;
    text-align: center;
  }
  .card .clan-chip {
    width: 86px;
    flex: none;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
  }
  .card .clan-chip.empty { border-color: transparent; }
  .card .year-chip {
    width: 42px;
    flex: none;
    text-align: center;
  }
  .card .ovr { font-size: 18px; flex: none; }
  @keyframes deal {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  /* ---------- rare pick effects (S / S+ gold, X purple) ---------- */
  .rare-gold, .picked-gold { --rare: #e8c878; --rare-soft: rgba(232, 200, 120, 0.35); }
  .rare-x,    .picked-x    { --rare: #b58cf0; --rare-soft: rgba(181, 140, 240, 0.45); }
  .card.rare-gold, .card.rare-x {
    border-color: var(--rare-soft);
    animation: deal 0.25s ease backwards, idle-glow 1.8s ease-in-out infinite;
  }
  .slot.rare-gold, .slot.rare-x {
    border-color: var(--rare-soft);
    border-left-color: var(--sc); /* keep the slot's accent stripe */
    animation: idle-glow 1.8s ease-in-out infinite;
  }
  @keyframes idle-glow {
    0%, 100% { box-shadow: 0 0 6px 0 var(--rare-soft); }
    50%      { box-shadow: 0 0 14px 2px var(--rare-soft); }
  }
  .card.picked-gold, .card.picked-x {
    pointer-events: none;
    border-color: var(--rare);
    /* Replaces the deal animation, so the inline deal stagger delay must be
       cleared in JS or the card blinks out while it waits to restart. */
    animation: rare-glow 0.3s ease forwards;
  }
  .card.picked-gold::after, .card.picked-x::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(105deg,
      transparent 25%,
      var(--rare-soft) 45%,
      var(--rare) 50%,
      var(--rare-soft) 55%,
      transparent 75%);
    opacity: 0.55;
    transform: translateX(-100%);
    animation: rare-sweep 0.25s ease-out forwards;
  }
  @keyframes rare-sweep {
    to { transform: translateX(100%); }
  }
  @keyframes rare-glow {
    0%   { box-shadow: 0 0 0 0 transparent; }
    30%  { box-shadow: 0 0 24px 3px var(--rare-soft), 0 0 6px 0 var(--rare); }
    100% { box-shadow: 0 0 10px 1px var(--rare-soft); }
  }
  .card.picked-x::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(216, 186, 255, 0.9);
    opacity: 0;
    animation: x-burst 0.28s ease-out forwards;
  }
  @keyframes x-burst {
    0%   { opacity: 0; }
    18%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .roll-foot {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
  }
  .stage .caption.under { margin-top: 12px; }

  .done-box {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .done-box .done-title {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--cyan);
  }
  .done-box .done-power {
    font-size: 34px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .done-box .done-power .unit { font-size: 12px; color: var(--muted); }

  /* ---------- gauntlet ---------- */
  .gauntlet-wrap {
    max-width: 1180px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px 48px;
  }
  .gauntlet-wrap .panel { width: 100%; }
  .g-stage { padding: 14px; }
  .g-open {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 40px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .g-open .g-open-title {
    font-family: var(--display);
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .g-open p {
    margin: 0;
    font-size: 10.5px;
    color: var(--faint);
    text-align: center;
    max-width: 460px;
  }
  .g-warn {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: #f27d7d;
    text-align: center;
    margin-bottom: 12px;
  }
  .g-open .g-warn { margin-bottom: 0; }

  .g-versus { display: flex; align-items: stretch; gap: 12px; margin-bottom: 12px; }
  .g-team {
    flex: 1 1 0;
    min-width: 0;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 12px;
  }
  .g-team.mine { border-left: 3px solid var(--cyan); }
  .g-team.foe  { border-left: 3px solid #f27d7d; }
  .g-team-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .g-team-head .g-t-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .g-team-head .pwr {
    font-size: 15px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .g-team ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 3px; }
  .g-team li { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .g-team li .nm {
    flex: 1 1 auto;
    min-width: 0;
    font-family: var(--display);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .g-team li .nm.dim { color: var(--faint); }
  .g-team li .tier-pill { font-size: 8px; padding: 1px 5px; }
  .g-team li .ld { color: var(--gold); font-size: 11px; }
  .g-team li .p-ovr {
    flex: none;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .g-team li .boost-tag {
    flex: none;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--gold);
  }
  .g-team li .boost-tag.neg { color: #f27d7d; }
  .g-team li .ptag {
    flex: none;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 1px 4px;
    border: 1px solid currentColor;
    border-radius: var(--radius);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .g-team li .ptag.cheat { color: #f27d7d; }
  .g-team li .ptag.trick { color: #f2b37d; }
  .g-team li .ptag.hf { color: var(--cyan); }
  .g-team li .ptag.tech { color: #b58cf0; }
  .g-versus.anim .boost-tag { animation: boost-pop 1.05s ease backwards; }
  .g-versus.anim .p-ovr.boosted { animation: ovr-flash 1.05s ease backwards; }
  .g-versus.anim .tier-pill.retier { animation: ovr-flash 1.05s ease backwards; }

  /* squad-wide advantage tags for the selected day */
  .g-teamtags {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 9px 12px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  /* rows keep the same height whether they hold tag chips or the plain
     "no squad advantages" text, so the rectangle never resizes */
  .g-teamtags .tt-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-height: 19px; }
  .g-teamtags .tt-side {
    flex: 0 0 118px;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--faint);
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tt-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 7px;
    border: 1px solid;
    border-radius: var(--radius);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tt-tag.lead { color: var(--gold); border-color: #57492a; background: #191507; }
  .tt-tag.hf { color: var(--cyan); border-color: rgba(100, 209, 193, 0.35); background: rgba(100, 209, 193, 0.07); }
  .tt-tag.tech { color: #b58cf0; border-color: rgba(181, 140, 240, 0.4); background: rgba(181, 140, 240, 0.08); }
  .tt-tag.hard { color: #f0a3a3; border-color: rgba(240, 163, 163, 0.4); background: rgba(240, 163, 163, 0.07); }
  .tt-tag.gauntlet { color: #f26d6d; border-color: rgba(242, 109, 109, 0.6); background: rgba(242, 109, 109, 0.13); }
  .tt-none { font-size: 9px; color: var(--faint); }
  .g-teamtags.anim .tt-tag { animation: boost-pop 1.05s ease backwards; }
  @keyframes boost-pop {
    0%   { opacity: 0; transform: translateY(7px) scale(0.7); }
    35%  { opacity: 1; transform: translateY(0) scale(1.3); }
    60%  { transform: scale(1); }
    100% { opacity: 1; }
  }
  @keyframes ovr-flash {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.3); color: #fff; }
    100% { transform: scale(1); }
  }
  /* 100+ boosted rating: white / light-purple swirl sweeping right */
  .tier-pill.xplus {
    color: #fff;
    border-color: #d8baff;
    background: linear-gradient(100deg,
      rgba(255, 255, 255, 0.05) 20%,
      rgba(255, 255, 255, 0.3) 40%,
      rgba(181, 140, 240, 0.5) 50%,
      rgba(255, 255, 255, 0.3) 60%,
      rgba(255, 255, 255, 0.05) 80%);
    background-size: 250% 100%;
    animation: xplus-sweep 1.5s linear infinite, xplus-glow 3s ease-in-out infinite;
  }
  @keyframes xplus-sweep {
    from { background-position: 120% 0; }
    to   { background-position: -130% 0; }
  }
  @keyframes xplus-glow {
    0%, 100% { box-shadow: 0 0 7px rgba(255, 255, 255, 0.75); }
    50%      { box-shadow: 0 0 9px rgba(181, 140, 240, 0.95); }
  }
  .g-mid {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 6px;
    max-width: 130px;
  }
  .g-mid .vs {
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--faint);
  }
  .g-mid .g-res { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-align: center; }
  .g-mid .g-res.w { color: var(--cyan); }
  .g-mid .g-res.l { color: #f27d7d; }
  .g-mid .g-sub {
    font-size: 8px;
    letter-spacing: 1.2px;
    color: var(--faint);
    text-transform: uppercase;
    text-align: center;
  }

  .g-cal { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .g-day {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    min-height: 74px;
    padding: 7px 9px;
    text-align: left;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    color: var(--text);
  }
  .g-day:hover { border-color: var(--cyan); }
  .g-day.sel { outline: 1px solid var(--cyan); border-color: var(--cyan); }
  .g-day.win { border-color: rgba(100, 209, 193, 0.45); }
  .g-day.loss { border-color: rgba(242, 125, 125, 0.45); }
  .g-day .d-top { display: flex; justify-content: space-between; align-items: baseline; gap: 4px; width: 100%; }
  .g-day .d-num { font-size: 9px; letter-spacing: 1px; color: var(--faint); }
  .g-day .d-type { font-size: 7.5px; font-weight: 700; letter-spacing: 1.2px; }
  .g-day .d-type.scrim { color: var(--cyan); }
  .g-day .d-type.raid { color: var(--gold); }
  .g-day .d-map {
    max-width: 100%;
    font-size: 9px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .g-day .d-res {
    margin-top: auto;
    font-size: 9.5px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .g-day .d-res.w { color: var(--cyan); }
  .g-day .d-res.l { color: #f27d7d; }
  .g-day .d-res.tbd { color: var(--faint); font-weight: 400; }

  .g-controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; margin: 0 0 12px; }

  .g-detail {
    margin-top: 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .g-detail .g-d-head { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  .g-detail .g-d-title {
    font-family: var(--display);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .g-detail .g-d-mode { font-size: 9px; letter-spacing: 1.2px; color: var(--muted); text-transform: uppercase; }
  .g-d-result { margin-top: 10px; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .g-d-result.w { color: var(--cyan); }
  .g-d-result.l { color: #f27d7d; }
  .g-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 9px; }
  .g-note {
    margin-top: 10px;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--faint);
    text-transform: uppercase;
  }

  .g-summary { margin-top: 16px; }
  .g-summary .done-power { font-size: 40px; }
  .g-summary .g-split {
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .g-summary .g-perfect { color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 2px; }

  @media (max-width: 700px) {
    /* Once the gauntlet is on screen the split-view stops making sense:
       body.g-on switches the page back to normal scrolling flow, so the
       roster, draft, and gauntlet stack without covering each other. */
    body.g-on {
      display: block;
      height: auto;
      overflow: auto;
    }
    body.g-on .board { flex: none; }
    body.g-on .panel { overflow-y: visible; }
    body.g-on .panel.roster, body.g-on .panel.draft { flex: none; }
    .gauntlet-wrap { padding: 0 12px 24px; }
    .g-stage { padding: 10px; }
    /* three day cells per row, each wide enough for "L 1107-1200" */
    .g-cal { grid-template-columns: repeat(3, 1fr); gap: 5px; }
    .g-day { min-height: 62px; padding: 5px 6px; }
    .g-day .d-map { font-size: 8px; }
    .g-day .d-res { font-size: 8.5px; letter-spacing: 0.3px; }
    /* the middle column shrinks to just the day label so the two fives
       get the width; rows drop identity chips to keep names on one line */
    .g-versus { gap: 6px; }
    .g-mid { max-width: 52px; padding: 0 2px; gap: 4px; }
    .g-mid .vs, .g-mid .g-res, .g-mid .g-sub-mode { display: none; }
    .g-mid .g-sub-day { font-size: 9px; font-weight: 700; color: var(--muted); }
    .g-team { padding: 8px; }
    .g-team li { gap: 5px; }
    .g-team li .tier-pill { display: none; }
    .g-team li .ptag { display: none; }
    .g-team li .nm { font-size: 13px; }
    .g-team li .ld { font-size: 10px; }
    .g-team li .boost-tag { font-size: 8px; letter-spacing: 0; }
    .g-team li .p-ovr { font-size: 11px; }
    .g-teamtags .tt-side { flex-basis: 100%; }
  }

  /* ---------- topbar tabs ---------- */
  .tabs { display: flex; gap: 6px; align-self: center; }
  .tab {
    background: none;
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 7px 14px;
  }
  .tab:hover { color: var(--text); border-color: var(--faint); }
  .tab.on { color: var(--cyan); border-color: var(--cyan); background: rgba(100, 209, 193, 0.08); }
  .view-hidden { display: none !important; }

  /* ---------- settings ---------- */
  .top-right {
    display: flex;
    align-items: center;
    gap: 10px;
    align-self: center;
    position: relative;
  }
  .tab.gear {
    font-size: 13px;
    line-height: 1;
    padding: 5px 9px;
  }
  .settings-pop {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 240px;
    background: var(--surface);
    border: 1px solid var(--line2);
    border-radius: var(--radius);
    padding: 12px 14px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    z-index: 50;
  }
  .settings-pop .pop-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 10px;
  }
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    cursor: pointer;
  }
  .setting-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text);
  }
  .setting-desc {
    display: block;
    margin-top: 3px;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.6px;
    text-transform: none;
    color: var(--faint);
  }
  .switch {
    appearance: none;
    -webkit-appearance: none;
    flex: 0 0 34px;
    width: 34px;
    height: 18px;
    margin: 0;
    border: 1px solid var(--line2);
    border-radius: 10px;
    background: var(--bg);
    position: relative;
    cursor: pointer;
  }
  .switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--faint);
    transition: left 0.15s ease, background 0.15s ease;
  }
  .switch:checked { border-color: var(--cyan); background: rgba(100, 209, 193, 0.12); }
  .switch:checked::after { left: 18px; background: var(--cyan); }

  .blind-flag[hidden] { display: none; }
  .blind-flag {
    display: inline-block;
    vertical-align: 2px;
    margin-left: 8px;
    font-family: var(--mono);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #b58cf0;
    border: 1px solid #4a3a6e;
    background: #140f22;
    border-radius: var(--radius);
    padding: 2px 7px;
  }
  .done-box .done-blind {
    display: inline-block;
    margin: 0 auto 16px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #b58cf0;
    border: 1px solid #4a3a6e;
    background: #140f22;
    border-radius: var(--radius);
    padding: 3px 9px;
  }

  /* ---------- tier list view ---------- */
  .listview {
    max-width: 1180px;
    width: 100%;
    margin: 0 auto;
    padding: 8px 20px 48px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .search-box {
    flex: 1 1 220px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 8px 12px;
  }

  var RAID_BASES = [

  var GAUNTLET_DAYS = 30;

  /* Internal opponent-picking tools -- programmable, no UI.

  var CLAN_ALLIES = { SURGE: ["ARCON"] };
  var CLAN_FORCED_PICKS = {
    WIJ: [{ name: "GeneralDroid", ovr: 75, tier: "B", clan: "WIJ", year: null, oneTrick: 2 }],

  };
  // Keyed by base `short` name: these players always defend that base,

  var BASE_FORCED_PICKS = {
    Altaris: ["FeatherRedemption"],

  // Tech clans rig their own turf: a second home-field layer of +5 that

  // programmable name list (data entries with oneTrick:true count too).
  var TECH_CLANS = ["RoA", "WIJ"];
  var ONE_TRICKS = ["f_reakmaster"];
  function techBonus(ev, p) {
    if (!ev.base || !p.clan) return 0;
    var home = ev.base.clan.toLowerCase();
    if (!TECH_CLANS.some(function (c) { return c.toLowerCase() === home; })) return 0;
    return p.clan.toLowerCase() === home ? 5 : 0;
  }
  // One-trick level: 2 = One Trick II (+15 on home turf), 1 = One Trick
  // (+10), 0 = everyone else. Mark II with oneTrick: 2 on the entry.
  function oneTrickLevel(p) {
    if (p.oneTrick === 2) return 2;

  }
  function isOneTrick(p) {
    return oneTrickLevel(p) > 0;
  }
  // One tricks live for this map -- the bonus only fires on their own

  function oneTrickBonus(ev, p) {
    var lvl = oneTrickLevel(p);

    if (p.clan.toLowerCase() !== ev.base.clan.toLowerCase()) return 0;

  function baseGuardBonus(ev) {

    Object.keys(map).forEach(function (k) {
      map[k] = map[k].map(function (entry) {
        var p = null;
        if (typeof entry === "string") {
          PLAYERS.forEach(function (c) { if (c.name === entry && (!p || c.ovr > p.ovr)) p = c; });
        } else {
          p = entry;
        }
        if (p && !p.color) p.color = TIER_COLOR[p.tier.charAt(0)] || TIER_COLOR.D;

      }).filter(function (p) { return p; });

  var gauntlet = null;    // { days: [...], selected: idx|null }
  var gSimming = false;   // sim-all cascade in flight
  var gAnimDay = -1;      // day whose home-field boosts are animating
  var listViewOn = false;

  // Tier bands mirror the pool data; 100+ only exists via day-of boosts.
  function tierForOvr(ovr) {
    if (ovr >= 100) return "X+";
    if (ovr >= 97) return "X";
    if (ovr >= 93) return "S+";
    if (ovr >= 89) return "S";
    if (ovr >= 80) return "A";
    if (ovr >= 70) return "B";
    if (ovr >= 65) return "C";

  }
  function baseClans(base) {
    var clans = [base.clan.toLowerCase()];

  function clanMatches(base, p) {

  // for one day only -- base OVRs are never mutated.
  function homeBonus(ev, p, isDefender) {

    if (ev.type === "raid" && isDefender) return 5;
    return clanMatches(ev.base, p) ? 5 : 0;
  }
  // A crowned leader colors the whole team's day: their class boosts -- or
  // drags -- every player on the roster. The class comes from real
  // leadership data (the CSV's Leader column, or a `leader` field on a
  // custom entry); a leader with no record is simply Raw +0, never punished
  // for missing data.
  var LEADER_CLASSES = {
    "Elite": 5, "Experienced": 3, "Good": 1, "Raw": 0, "No Mic": -1, "Negative": -5
  };
  function leaderClass(team, leaderName) {
    if (!leaderName) return null;
    for (var i = 0; i < team.length; i++) {
      if (team[i].name === leaderName) {
        var label = team[i].leader && LEADER_CLASSES.hasOwnProperty(team[i].leader)
          ? team[i].leader : "Raw";
        return { label: label, amt: LEADER_CLASSES[label] };
      }
    }
    return null;
  }
  function fmtAmt(amt) {
    return (amt >= 0 ? "+" : "") + amt;
  }

  function gauntletEligible() {
    return openCount() === 0;
  }
  function myTeam() {
    return slots.filter(function (p) { return p; });
  }
  function teamPower(team) {
    var sum = 0;
    team.forEach(function (p) { sum += p.ovr; });
    return team.length ? Math.round(sum / team.length) : 0;
  }
  // Upsets exist but stay rare: a 10-point favorite wins ~95% of the time.
  function winProb(mine, theirs) {
    return 1 / (1 + Math.pow(10, (theirs - mine) / 8));
  }
  // Normalizes an event to the map it is fought on; every event carries a
  // base now (scrims are booked on a random fairzone venue).
  function evMode(ev) {
    var b = ev.base;
    if (b.mode === "fairzone") return { mode: "fairzone", target: b.target, label: "Fairzone " + b.target };
    if (b.mode === "phase") return { mode: "phase", phases: b.phases, label: "Phase Base " + b.phases };
    return { mode: "base", label: b.detail ? "Base · " + b.detail : "Base" };
  }
  function evMapShort(ev) {
    return ev.type === "raid" ? ev.base.clan + " · " + ev.base.short : "Scrim · " + ev.base.short;
  }

  // The whole month is booked up front: every day already has its
  // opponent five, leader, and home-field bonuses. Bonuses are computed
  // per event and reset with it -- nothing carries to the next day.
  function startGauntlet() {
    var days = [];
    for (var d = 0; d < GAUNTLET_DAYS; d++) {
      var isRaid = Math.random() < 0.5;
      var ev = {
        day: d + 1,
        type: isRaid ? "raid" : "scrim",
        base: isRaid
          ? RAID_BASES[Math.floor(Math.random() * RAID_BASES.length)]
          : FAIRZONES[Math.floor(Math.random() * FAIRZONES.length)],
        pins: [],        // programmable: extra forced opponent players
        tiers: [],       // programmable: tier limit for the random fill
        leaderName: "",  // programmable: opponent leader; "" = random
        opponent: null,

      ev.oppBoosts = ev.opponent.map(function (p) {

          baseGuardBonus(ev) + (ev.oppLead ? ev.oppLead.amt : 0);

  // Your side's leader bonus follows the crown, not the schedule: it is
  // recomputed whenever an unplayed day is shown or simmed, so crowning a
  // leader mid-month still counts for the remaining days.
  function refreshMyBonuses(ev) {
    ev.myLead = leaderClass(myTeam(), leaderIdx !== null && slots[leaderIdx] ? slots[leaderIdx].name : "");
    ev.myBoosts = myTeam().map(function (p) {
      return homeBonus(ev, p, false) + techBonus(ev, p) + oneTrickBonus(ev, p) + (ev.myLead ? ev.myLead.amt : 0);
    });
  }

  // Opponent five: clan forced picks first, then random fill. Raids draw
  // from the base owner's clan (plus allies); filters relax step by step
  // so a thin clan or a strict tier limit can never leave the team short.
  function buildOpponent(ev) {
    var myNames = lockedNames();
    var forced = ev.type === "raid"
      ? (BASE_FORCED_PICKS[ev.base.short] || []).concat(CLAN_FORCED_PICKS[ev.base.clan] || [])
      : [];
    var team = [];
    var used = {};
    forced.concat(ev.pins).forEach(function (p) {
      if (team.length < 5 && p && !used[p.name]) { team.push(p); used[p.name] = true; }
    });
    // Scrim squads always bring at least one S-tier-or-better player.
    function isStrong(p) { return p.tier === "S" || p.tier === "S+" || p.tier === "X"; }
    if (ev.type === "scrim" && team.length < 5 && !team.some(isStrong)) {
      sample(PLAYERS.filter(function (p) {
        return !used[p.name] && !myNames[p.name] && isStrong(p);
      }), 1).forEach(function (p) { team.push(p); used[p.name] = true; });
    }
    function poolWhere(useClan, useTiers) {
      return PLAYERS.filter(function (p) {
        if (used[p.name] || myNames[p.name]) return false;
        if (useClan && ev.type === "raid" && !clanMatches(ev.base, p)) return false;
        if (useTiers && ev.tiers.length && ev.tiers.indexOf(p.tier) === -1) return false;
        return true;
      });
    }
    var relax = [[true, true], [true, false], [false, true], [false, false]];
    for (var r = 0; r < relax.length && team.length < 5; r++) {
      sample(poolWhere(relax[r][0], relax[r][1]), 5 - team.length).forEach(function (p) {
        if (team.length < 5 && !used[p.name]) { team.push(p); used[p.name] = true; }
      });

    if (ev.leaderName) {
      team.forEach(function (p) { if (p.name === ev.leaderName) leader = p; });
    }
    if (!leader) {

      // class first, rating as the tiebreaker. Negative classes lose to
      // a plain Raw +0 teammate.
      team.forEach(function (p) {
        if (!leader) { leader = p; return; }
        var a = LEADER_CLASSES[p.leader] || 0;
        var b = LEADER_CLASSES[leader.leader] || 0;

  function boostedPower(team, boosts) {
    var sum = 0;

  }

  // Raid-side "overwhelm gate", shared by every raid mode, anchored to
  // absolute power: the matchup diff is shifted by half of how far the
  // attacker sits from 100 effective, so only a truly maxed group rides
  // the top of the bell curve. Even-or-worse pushes follow the 50/70/90
  // loss ladder; past even, the win chance climbs a steep sigmoid toward
  // 0.99. Tuned by Monte Carlo: a maxed group (103 effective = 98 power +

  // group only rarely (~7%), and an average draft essentially never.
  function overwhelmGate(diff, mine) {
    var d = diff + (mine - 100) * 0.6;
    if (d <= 0) return Math.max(0.05, 0.5 + d * 0.04);
    var b = 1 / (1 + Math.exp(1.75 / 0.5));
    var s = 1 / (1 + Math.exp(-(d - 1.75) / 0.5));
    return 0.5 + (0.99 - 0.5) * (s - b) / (1 - b);

  function simulateEvent(ev) {
    var mine = boostedPower(myTeam(), ev.myBoosts);
    var theirs = boostedPower(ev.opponent, ev.oppBoosts);
    var p = winProb(mine, theirs);
    var diff = mine - theirs; // signed: positive = we outmatch them
    var m = evMode(ev);
    var win, text;
    if (m.mode === "fairzone") {
      // A fairzone is a fairzone: raids and scrims share the classic
      // curve, so upsets are equally uncommon in both.
      win = Math.random() < p;
      // Margin tracks the power gap (~5 apart lands near 1200-1000, ~15
      // near 1200-800, past ~20 the loser collapses), but the spread grows
      // with the gap too -- a 10-gap day can swing anywhere around 600-900.
      // An upset never runs away with it: the favorite falls by a hair.
      var gap = Math.abs(diff);
      var upset = gap > 0 && (diff > 0) !== win;
      var frac;

        frac = gap <= 15 ? 0.92 - gap / 60 : 0.67 - (gap - 15) * 0.045;
        frac += (Math.random() * 2 - 1) * Math.min(0.15, 0.05 + gap * 0.01);
        frac = Math.max(0.08, Math.min(0.97, frac));
      }
      var loser = Math.round(m.target * frac);
      text = win ? m.target + "–" + loser : loser + "–" + m.target;
    } else if (m.mode === "phase") {
      // Multi-phase bases are brutal at even skill: ~50% loss, a 5-power
      // deficit loses ~70%, 10+ down is ~90%. Any real edge rides the gate.
      win = Math.random() < overwhelmGate(diff, mine);
      if (win) {
        text = "WON";
      } else {
        // Where the push died: usually deep in the base. Anchorage and
        // Ancient Temple hold at the door, and big gaps stall out early.
        var w1 = ev.base.hardP1 ? 0.55 : 0.15;
        if (diff <= -10) w1 = Math.min(0.85, w1 + 0.35);
        else if (diff <= -5) w1 += 0.15;
        var heldAt;
        if (Math.random() < w1) heldAt = 1;
        else heldAt = 2 + Math.floor(Math.random() * (m.phases - 1));
        text = "P" + heldAt + " HELD";
      }
    } else {
      // Plain base: even powers are a coin flip, the gap swings it hard.
      win = Math.random() < overwhelmGate(diff, mine);
      text = win ? "WON" : "HELD";
    }
    ev.result = { win: win, text: text, myPwr: mine, opPwr: theirs };
  }

  function gauntletRecord() {
    var rec = { w: 0, l: 0, sw: 0, sl: 0, rw: 0, rl: 0, done: 0 };
    gauntlet.days.forEach(function (ev) {
      if (!ev.result) return;
      rec.done++;
      if (ev.result.win) { rec.w++; if (ev.type === "scrim") rec.sw++; else rec.rw++; }
      else { rec.l++; if (ev.type === "scrim") rec.sl++; else rec.rl++; }

    return rec;
  }
  function nextUnplayed() {

  // Single-day sim plays out on the matchup strip: home-field bonuses pop
  // in first (+N tags, ratings flash, tiers recolor), then the result lands.
  function simDay(i) {
    if (!gauntlet || gSimming || i < 0 || gauntlet.days[i].result) return;
    var ev = gauntlet.days[i];
    refreshMyBonuses(ev);
    var hasBoost = ev.myBoosts.some(function (b) { return b; }) ||
      ev.oppBoosts.some(function (b) { return b; });
    gSimming = true;
    gauntlet.selected = i;
    gAnimDay = hasBoost ? i : -1;
    renderGauntlet();
    setTimeout(function () {
      simulateEvent(ev);
      gSimming = false;
      gAnimDay = -1;
      renderGauntlet();
      maybeFinishGauntlet();
    }, hasBoost ? 1250 : 350);
  }
  function simAll() {
    if (!gauntlet || gSimming || nextUnplayed() === -1) return;
    gSimming = true;
    (function step() {
      var i = nextUnplayed();
      if (i === -1) {
        gSimming = false;
        renderGauntlet();
        maybeFinishGauntlet();
        return;
      }
      refreshMyBonuses(gauntlet.days[i]);
      simulateEvent(gauntlet.days[i]);
      gauntlet.selected = i;
      renderGauntlet();

    })();
  }

  function gTeamHTML(cls, title, team, leaderName, pwr, boosts, showBoost, ev, isFoe) {
    var html = '<div class="g-team ' + cls + '"><div class="g-team-head">' +
      '<span class="g-t-name">' + title + '</span><span class="pwr">' + pwr + '</span></div><ul>';

    tEls.count.innerHTML = "<b>" + rows.length + "</b> player" + (rows.length === 1 ? "" : "s") +
      " &middot; team power <b>" + avg + "</b>";
    tEls.summary.hidden = false;
    tEls.statSize.textContent = rows.length;
    tEls.statPower.textContent = avg;
  }

  function addTeamPlayer(p) {
    if (!p || teamHas(p.name)) return;
    teamPicks.push(p);
    tEls.search.value = "";
    closeSuggest();
    renderTeam();
    tEls.search.focus();
  }

  tEls.search.addEventListener("input", function () {
    suggestIdx = -1;
    renderSuggest();
  });
  tEls.search.addEventListener("focus", renderSuggest);
  tEls.search.addEventListener("keydown", function (e) {
    if (e.key === "Escape") { closeSuggest(); return; }
    var matches = teamMatches();
    if (e.key === "ArrowDown" && matches.length) {
      e.preventDefault();
      suggestIdx = (suggestIdx + 1) % matches.length;
      renderSuggest();
    } else if (e.key === "ArrowUp" && matches.length) {
      e.preventDefault();
      suggestIdx = (suggestIdx <= 0 ? matches.length : suggestIdx) - 1;
      renderSuggest();
    } else if (e.key === "Enter") {
      e.preventDefault();
      addTeamPlayer(suggestIdx >= 0 ? matches[suggestIdx] : matches[0]);
    }
  });
  tEls.add.addEventListener("click", function () {
    var matches = teamMatches();
    if (matches.length) addTeamPlayer(suggestIdx >= 0 ? matches[suggestIdx] : matches[0]);
    else { tEls.search.focus(); renderSuggest(); }
  });
  tEls.suggest.addEventListener("click", function (e) {
    var btn = e.target.closest("button[data-name]");
    if (!btn) return;
    var name = btn.getAttribute("data-name");
    addTeamPlayer(TEAM_POOL.filter(function (p) { return p.name === name; })[0]);
  });
  tEls.body.addEventListener("click", function (e) {
    var btn = e.target.closest(".btn-remove");
    if (!btn) return;
    var name = btn.getAttribute("data-name");
    teamPicks = teamPicks.filter(function (p) { return p.name !== name; });
    renderTeam();
  });
  tEls.clear.addEventListener("click", function () {
    teamPicks = [];
    tEls.search.value = "";
    closeSuggest();
    renderTeam();
  });
  document.addEventListener("click", function (e) {
    if (tEls.suggest.hidden) return;
    if (tEls.search.contains(e.target) || tEls.suggest.contains(e.target)) return;
    closeSuggest();
  });

  renderTeam();

  /* ---------- topbar tabs ---------- */
  var TABS = {
    draft: { tab: document.getElementById("tab-draft"), view: document.getElementById("view-draft") },
    list:  { tab: document.getElementById("tab-list"),  view: document.getElementById("view-list") },
    team:  { tab: document.getElementById("tab-team"),  view: document.getElementById("view-team") }
  };
  function setView(name) {
    Object.keys(TABS).forEach(function (key) {
      var on = key === name;
      TABS[key].view.classList.toggle("view-hidden", !on);
      TABS[key].tab.classList.toggle("on", on);
      TABS[key].tab.setAttribute("aria-pressed", String(on));
    });
    listViewOn = name !== "draft";
    renderGauntletGate();
  }
  Object.keys(TABS).forEach(function (key) {
    TABS[key].tab.addEventListener("click", function () { setView(key); });
  });

  /* ---------- settings ---------- */
  var gearBtn = document.getElementById("btn-settings");
  var settingsPop = document.getElementById("settings-pop");
  var blindOpt = document.getElementById("opt-blind");

  blindOpt.checked = blindMode;

  function setSettingsOpen(open) {
    settingsPop.hidden = !open;
    gearBtn.classList.toggle("on", open);
    gearBtn.setAttribute("aria-expanded", String(open));
  }
  gearBtn.addEventListener("click", function () {
    setSettingsOpen(settingsPop.hidden);
  });
  document.addEventListener("click", function (e) {
    if (settingsPop.hidden) return;
    if (gearBtn.contains(e.target) || settingsPop.contains(e.target)) return;
    setSettingsOpen(false);
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape" && !settingsPop.hidden) setSettingsOpen(false);
  });

  blindOpt.addEventListener("change", function () {
    blindMode = this.checked;
    try { localStorage.setItem(BLIND_KEY, blindMode ? "1" : "0"); } catch (e) {}
    render();
  });
</script>

<script>
  fetch("https://api.counterapi.dev/v1/clandraft-buildteam/index/up").catch(function () {});
</script>

</body>
